<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Crie um novo perfil.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="criar-perfil.css">
    <title>Criar Perfil</title>
</head>
<body class="animated-gradient">
    <h1>Criar Perfil</h1>
    <a href="../index.html" class="go-back">Voltar</a>
    <form class="criar-perfil">
        <label for="nome">Nome do Perfil</label>
        <input type="text" id="nome" name="nome" required>
        <p>Escolha a foto de perfil:</p>
        <label>
            <input type="radio" name="foto" value="perfil1" required>
            <img src="../assets/Foto de perfil minim-fem.png" alt="Avatar do perfil 1">
        </label>
        <label>
            <input type="radio" name="foto" value="perfil2" required>
            <img src="../assets/Foto de perfil minim.png" alt="Avatar do perfil 2">
        </label>
        <button type="submit" class="adicionar-perfil">Criar Perfil</button>
    </form>
</body>
</html>
