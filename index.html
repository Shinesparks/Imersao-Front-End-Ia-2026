<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Escolha seu perfil e comece a assistir seus conteúdos favoritos.">
    <link rel="stylesheet" href="style.css">
    <title>Quem está assistindo?</title>
</head>
<body class="animated-gradient">
    <main>
        <section>
            <h1>Quem está assistindo?</h1>
            <ul class="profiles">
                <li class="profile">
                    <button type="button" aria-label="Selecionar perfil 1">
                        <figure>
                            <img src="assets/Foto de perfil minim-fem.png" alt="Avatar do perfil 1">
                            <figcaption class="perfil-nome">Perfil 1</figcaption>
                        </figure>
                    </button>
                </li>
                <li class="profile">
                    <button type="button" aria-label="Selecionar perfil 2">
                        <figure>
                            <img src="assets/Foto de perfil minim.png" alt="Avatar do perfil 2">
                            <figcaption class="perfil-nome">Perfil 2</figcaption>
                        </figure>
                    </button>
                </li>
            </ul>
             <a href="criar-perfil/criar-perfil.html" class="adicionar-perfil" aria-label="Adicionar perfil">Criar Perfil</a>
        </section>
    </main>

    <script src="js/index.js"></script>
</body>
</html>
